# Workflow for building and publishing Inkless edge (development) images to GHCR
# Uses native runners for each architecture for faster builds

name: Inkless Edge

on:
  workflow_dispatch:
    inputs:
      push_image:
        description: 'Push image to GHCR'
        type: boolean
        default: true
  push:
    branches:
      - main

concurrency:
  group: inkless-edge-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/aiven/inkless

jobs:
  # Determine the image tags
  prepare:
    runs-on: ubuntu-latest
    outputs:
      edge_tag: edge
      sha_tag: ${{ steps.sha-tag.outputs.tag }}
    steps:
      - name: Determine SHA tag
        id: sha-tag
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "tag=edge-${SHORT_SHA}" >> $GITHUB_OUTPUT

  # Build on each architecture using native runners
  build:
    needs: prepare
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Gradle
        uses: ./.github/actions/setup-gradle
        with:
          java-version: 17
          gradle-cache-read-only: false

      - name: Build Kafka distribution
        run: ./gradlew releaseTarGz

      - name: Prepare Docker build context
        run: |
          cp -R core/build/distributions docker/resources/.

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@988b5a0280414f521da01fcc63a27aeeb4b104db # v3.6.1

      - name: Login to GitHub Container Registry
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Kafka version from distribution
        id: kafka-version
        run: |
          TARBALL=$(ls core/build/distributions/kafka_2.13-*.tgz | head -1)
          VERSION=$(basename "$TARBALL" | sed 's/kafka_2.13-\(.*\)\.tgz/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Prepare Docker build directory
        id: docker-prep
        run: |
          DOCKER_DIR=$(mktemp -d)
          cp -r docker/inkless/* "$DOCKER_DIR/"
          cp -r docker/resources "$DOCKER_DIR/"
          echo "docker-dir=$DOCKER_DIR" >> $GITHUB_OUTPUT

      - name: Build and push architecture-specific image
        uses: docker/build-push-action@4f58ea79222b3b9dc2c8bbdd6debcef730109a75 # v6.9.0
        with:
          context: ${{ steps.docker-prep.outputs.docker-dir }}
          file: ${{ steps.docker-prep.outputs.docker-dir }}/Dockerfile
          platforms: linux/${{ matrix.arch }}
          push: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.push_image) }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ needs.prepare.outputs.edge_tag }}-${{ matrix.arch }}
            ${{ env.IMAGE_NAME }}:${{ needs.prepare.outputs.sha_tag }}-${{ matrix.arch }}
          build-args: |
            kafka_version=${{ steps.kafka-version.outputs.version }}
            build_date=${{ github.event.head_commit.timestamp }}
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}

  # Create multi-arch manifests
  manifest:
    needs: [prepare, build]
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.push_image)
    runs-on: ubuntu-latest
    permissions:
      packages: write

    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push edge manifest
        run: |
          docker buildx imagetools create -t ${{ env.IMAGE_NAME }}:edge \
            ${{ env.IMAGE_NAME }}:edge-amd64 \
            ${{ env.IMAGE_NAME }}:edge-arm64

      - name: Create and push SHA manifest
        run: |
          SHA_TAG="${{ needs.prepare.outputs.sha_tag }}"
          docker buildx imagetools create -t ${{ env.IMAGE_NAME }}:${SHA_TAG} \
            ${{ env.IMAGE_NAME }}:${SHA_TAG}-amd64 \
            ${{ env.IMAGE_NAME }}:${SHA_TAG}-arm64

      - name: Inspect manifest
        run: |
          docker buildx imagetools inspect ${{ env.IMAGE_NAME }}:edge

      - name: Output image details
        run: |
          echo "## Edge Docker Image Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Images:**" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.IMAGE_NAME }}:edge\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.IMAGE_NAME }}:${{ needs.prepare.outputs.sha_tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Platforms:** linux/amd64, linux/arm64" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Pull Command" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.IMAGE_NAME }}:edge" >> $GITHUB_STEP_SUMMARY
          echo "# or for this specific commit:" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.IMAGE_NAME }}:${{ needs.prepare.outputs.sha_tag }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
